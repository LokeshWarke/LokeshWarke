name: Update Profile Stats Cards

on:
  schedule:
    - cron: '0 0 * * *' # Automatically updates every day at midnight
  workflow_dispatch: # Allows you to manually trigger updates from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Core Stats Card
        uses: anuraghazra/github-readme-stats@v2.4.0 # Deploys local SVG asset generation
        with:
          card: stats
          options: theme=radical&show_icons=true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages Card
        uses: anuraghazra/github-readme-stats@v2.4.0
        with:
          card: top-langs
          options: theme=radical&layout=compact
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add profile/*.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update profile stats graphics" && git push)
